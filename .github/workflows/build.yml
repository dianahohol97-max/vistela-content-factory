name: build-content

on:
  schedule:
    - cron: "0 6 * * 1"      # every Monday 06:00 UTC (keeps queue fresh)
  workflow_dispatch: {}

concurrency:
  group: build-content
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch brand font
        run: |
          mkdir -p fonts
          curl -sSLg -o fonts/CormorantGaramond.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/cormorantgaramond/CormorantGaramond%5Bwght%5D.ttf"

      - name: Generate content + queue
        run: python build.py

      - name: Commit generated media & queue
        run: |
          git config user.name "vistela-factory-bot"
          git config user.email "actions@users.noreply.github.com"
          git add output queue
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh pins, carousels & queue [skip ci]"
            git push
          fi
